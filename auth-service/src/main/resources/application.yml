server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:h2:mem:authdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# JWT secret must be at least 256 bits (32 bytes) for HS256.
# In production, this would be injected via environment variable or secret manager.
jwt:
  secret: msa-platform-secret-key-for-jwt-token-generation-2024
  expiration-ms: 86400000
